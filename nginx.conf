events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging settings
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # Performance tuning
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Set client upload limit to 20M for bulk students upload and large forms
    client_max_body_size 20M;

    # HTTP - Redirect all traffic to HTTPS (except Let's Encrypt challenges)
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Let's Encrypt ACME challenge directory
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP requests to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS - Production Web Service Configuration
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name _;

        # SSL Certificates (managed by Certbot / Let's Encrypt volume)
        ssl_certificate /etc/letsencrypt/live/production/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/production/privkey.pem;

        # Standard SSL security settings (Mozilla Intermediate Profile)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # DNS resolver (Docker's built-in DNS server is always 127.0.0.11)
        resolver 127.0.0.11 valid=5s;

        # Frontend: Serve Reflex static files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Backend FastAPI: Forward API requests
        location /api {
            set $backend_upstream "http://backend:8888";
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Disable buffering for stream logs
            proxy_buffering off;
        }

        # Reflex Event Backend: HTTP calls and WebSocket upgrades
        location ~ ^/(_event|ping|register) {
            set $reflex_upstream "http://reflex-backend:8010";
            proxy_pass $reflex_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Extended timeouts for WebSockets / active admin sessions
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
